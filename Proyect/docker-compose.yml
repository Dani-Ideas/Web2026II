services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: fleetops
      DB_PASSWORD: secret
      DB_NAME: fleetops_db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./public/uploads:/app/public/uploads
      - ./views:/app/views
      - ./public/css:/app/public/css
      - ./public/js:/app/public/js
      - ./controllers:/app/controllers
      - ./routes:/app/routes

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: fleetops_db
      MYSQL_USER: fleetops
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ufleetops", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
