<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teclado QWERTY Virtual</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="app">
        <h1>⌨️ Teclado Virtual QWERTY (LatAm)</h1>

        <!-- Pantalla -->
        <section class="pantalla-container">
            <textarea id="pantalla" placeholder="Escribe aquí..."></textarea>
        </section>

        <!-- Teclado -->
        <section id="teclado-container">
            <div id="teclado"></div>
        </section>
    </main>

    <script src="app.js"></script>

</body>
</html>
